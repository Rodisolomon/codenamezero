<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>易渊 · 排版探索 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Bodoni+Moda:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Cormorant Garamond', 'Noto Serif SC', serif;
  --sans:  'Noto Sans SC', system-ui, sans-serif;
  --mono:  'JetBrains Mono', ui-monospace, monospace;
  --display:'Bodoni Moda', 'Noto Serif SC', serif;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body { font-family: var(--sans); background: #0a100a; color: #e8e8e8; -webkit-font-smoothing: antialiased; }
img { display: block; max-width: 100%; }

.exp-toolbar {
  display: flex; justify-content: flex-end; align-items: center;
  padding: 14px 28px 0;
  background: transparent;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
}
.exp-palette { display: flex; gap: 2px; }
.exp-tab {
  padding: 8px 16px; background: transparent;
  border: 1px solid rgba(255,255,255,0.12); color: #8a8a8a;
  cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
  transition: all 0.2s;
}
.exp-tab:hover { color: #d8c8a8; border-color: rgba(216,200,168,0.4); }
.exp-tab.active { color: #0a0a0a; background: #d8c8a8; border-color: #d8c8a8; }
.exp-stage { padding-top: 0; }
.exp-stage > section { display: none; }
.exp-stage > section.active { display: block; }

/* ============================================================
   A · CINEMA DOSSIER — refined with full-bleed openers + media
   ============================================================ */
#var-cinema { background: #050505; color: #e8e2d6; }
#var-cinema .cin-hero {
  min-height: 100vh; padding: 80px 8vw 40px;
  display: grid; grid-template-rows: auto 1fr auto;
  border-bottom: 1px solid rgba(216,200,168,0.15);
}
#var-cinema .cin-tc {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; color: #8a7a5a;
  display: flex; justify-content: space-between;
}
#var-cinema .cin-tc .tc-red { color: #b3382e; }
#var-cinema .cin-tc .tc-red::before { content: '●'; margin-right: 6px; animation: blink 1.4s steps(2, end) infinite; }
@keyframes blink { 50% { opacity: 0; } }
#var-cinema .cin-name-block { align-self: center; max-width: 1200px; margin: 0 auto; width: 100%; }
#var-cinema .cin-name-row {
  display: grid; grid-template-columns: 200px 1fr; gap: 60px; align-items: end;
  border-bottom: 1px solid rgba(216,200,168,0.18); padding-bottom: 48px;
}
#var-cinema .cin-fileid { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: #6a5a3a; line-height: 1.8; }
#var-cinema .cin-fileid strong { color: #d8c8a8; font-weight: 600; }

/* CINEMA — archive photo plate */
#var-cinema .cin-photo-plate {
  width: 220px; flex: none; align-self: start;
  display: flex; flex-direction: column; gap: 10px;
  margin-bottom: 12px;
}
#var-cinema .cin-photo {
  position: relative; aspect-ratio: 4/5; width: 100%;
  background:
    repeating-linear-gradient(135deg, rgba(216,200,168,0.04) 0 2px, transparent 2px 6px),
    linear-gradient(180deg, #1a1612 0%, #0c0a08 100%);
  border: 1px solid rgba(216,200,168,0.22);
  box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 0 0 6px #050505, 0 0 0 7px rgba(216,200,168,0.12);
  overflow: hidden;
}
#var-cinema .cin-photo::before {
  content: ''; position: absolute; inset: 18% 22% 32% 22%;
  background:
    radial-gradient(ellipse 38% 28% at 50% 38%, rgba(216,200,168,0.16), transparent 70%),
    radial-gradient(ellipse 50% 42% at 50% 78%, rgba(120,90,70,0.18), transparent 70%);
  border-radius: 50% 50% 46% 46% / 56% 56% 44% 44%;
}
#var-cinema .cin-photo::after {
  content: 'NO IMAGE ON FILE';
  position: absolute; left: 0; right: 0; bottom: 14px;
  text-align: center;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.32em; color: #6a5a3a;
}
#var-cinema .cin-photo-corner {
  position: absolute; width: 14px; height: 14px;
  border-color: #b8a878; border-style: solid; border-width: 0;
}
#var-cinema .cin-photo-corner.tl { top: 6px; left: 6px; border-top-width: 1px; border-left-width: 1px; }
#var-cinema .cin-photo-corner.tr { top: 6px; right: 6px; border-top-width: 1px; border-right-width: 1px; }
#var-cinema .cin-photo-corner.bl { bottom: 6px; left: 6px; border-bottom-width: 1px; border-left-width: 1px; }
#var-cinema .cin-photo-corner.br { bottom: 6px; right: 6px; border-bottom-width: 1px; border-right-width: 1px; }
#var-cinema .cin-photo-stamp {
  position: absolute; right: -10px; top: 16px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.28em; color: #b3382e;
  border: 1px solid #b3382e; padding: 4px 8px;
  transform: rotate(6deg); background: rgba(8,5,3,0.4);
}
#var-cinema .cin-photo-cap {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; color: #6a5a3a;
}
#var-cinema .cin-photo-cap strong { color: #b8a878; font-weight: 500; }
#var-cinema .cin-zh {
  font-family: var(--display); font-size: clamp(120px, 18vw, 280px); font-weight: 500;
  line-height: 0.85; letter-spacing: -0.02em; margin: 0;
  font-style: italic;
  display: inline-block;
  position: relative;
  background: linear-gradient(180deg, #f4ecdc 0%, #ece4d6 50%, #b8a878 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
#var-cinema .cin-zh::after {
  content: ''; position: absolute; left: 0; bottom: -18px; height: 1px; width: 88px;
  background: linear-gradient(90deg, #b3382e, transparent);
}
#var-cinema .cin-en {
  display: flex; align-items: baseline; justify-content: space-between; margin-top: 36px;
  font-family: var(--mono); font-size: 14px; letter-spacing: 0.32em; color: #b8a878;
}
#var-cinema .cin-en .en-aka { color: #6a5a3a; font-size: 11px; letter-spacing: 0.18em; }
#var-cinema .cin-quote {
  align-self: end; max-width: 720px; margin: 80px 0 0;
  font-family: var(--serif); font-style: italic; font-size: 28px; line-height: 1.5;
  color: #d8c8a8; padding-left: 40px; border-left: 2px solid #b3382e;
}
#var-cinema .cin-quote .q-attr {
  margin-top: 18px; font-family: var(--mono); font-style: normal; font-size: 11px;
  letter-spacing: 0.2em; color: #6a5a3a;
}

/* CINEMA — section opener with poster as portrait plate (left) + content (right) */
#var-cinema .cin-opener {
  display: grid; grid-template-columns: minmax(380px, 0.55fr) 1fr;
  gap: 80px; padding: 80px 8vw; min-height: 100vh; align-items: stretch;
  border-top: 1px solid rgba(216,200,168,0.18); border-bottom: 1px solid rgba(216,200,168,0.18);
  background: #050505;
}
#var-cinema .cin-opener-poster {
  position: relative; align-self: center;
  border: 1px solid rgba(216,200,168,0.25); padding: 16px;
  background: rgba(216,200,168,0.04);
}
#var-cinema .cin-opener-poster img {
  width: 100%; height: auto; display: block;
  filter: grayscale(0.18) contrast(1.08) brightness(1.18);
}
#var-cinema .cin-opener-poster-meta {
  display: flex; justify-content: space-between; margin-top: 14px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; color: #b8a878; text-transform: uppercase;
}
#var-cinema .cin-opener-inner {
  display: grid; grid-template-rows: auto 1fr auto; align-self: stretch;
}
#var-cinema .cin-opener-tc {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; color: #b8a878;
  display: flex; gap: 24px; flex-wrap: wrap;
  border-bottom: 1px solid rgba(216,200,168,0.18); padding-bottom: 16px;
}
#var-cinema .cin-opener-num {
  font-family: var(--display); font-size: clamp(160px, 22vw, 320px); font-weight: 900;
  line-height: 0.85; letter-spacing: -0.06em; color: #ece4d6;
  align-self: center; margin: 24px 0; user-select: none;
}
#var-cinema .cin-opener-foot {
  display: grid; gap: 24px;
  border-top: 1px solid rgba(216,200,168,0.4); padding-top: 24px;
}
#var-cinema .cin-opener-titles {
  display: flex; align-items: baseline; gap: 24px; flex-wrap: wrap;
}
#var-cinema .cin-opener-zh {
  font-family: var(--display); font-size: clamp(56px, 7vw, 96px); font-weight: 700;
  letter-spacing: 0.02em; color: #ece4d6;
}
#var-cinema .cin-opener-en {
  font-family: var(--mono); font-size: 13px; letter-spacing: 0.3em; color: #d8c8a8;
}
#var-cinema .cin-opener-summary {
  font-family: var(--serif); font-style: italic; font-size: 20px; line-height: 1.55;
  color: #d8c8a8; max-width: 640px; text-wrap: pretty; margin: 0;
}
#var-cinema .cin-opener-detail { font-size: 13px; line-height: 1.85; color: #9a8a6a; max-width: 640px; text-wrap: pretty; }
#var-cinema .cin-opener-detail p { margin: 0 0 14px; }
#var-cinema .cin-opener-tags {
  margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
}
#var-cinema .cin-opener-tags span { padding: 5px 10px; border: 1px solid rgba(216,200,168,0.4); color: #d8c8a8; }

/* CINEMA chapter divider (no poster) */
#var-cinema .cin-chapter {
  min-height: 60vh; display: grid; grid-template-rows: auto 1fr auto;
  padding: 100px 8vw 60px; background: #000;
  border-top: 1px solid rgba(216,200,168,0.12); border-bottom: 1px solid rgba(216,200,168,0.12);
}
#var-cinema .cin-chapter-meta {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; color: #6a5a3a;
  display: flex; justify-content: space-between;
}
#var-cinema .cin-chapter-num {
  font-family: var(--display); font-size: clamp(180px, 28vw, 420px); font-weight: 900;
  line-height: 0.8; letter-spacing: -0.06em; color: rgba(216,200,168,0.06);
  align-self: center; margin: 40px 0; user-select: none;
}
#var-cinema .cin-chapter-title {
  display: flex; align-items: baseline; justify-content: space-between;
  border-top: 1px solid rgba(216,200,168,0.18); padding-top: 24px;
}
#var-cinema .cin-chapter-zh {
  font-family: var(--serif); font-size: clamp(48px, 6vw, 88px); font-weight: 600;
  letter-spacing: 0.04em; color: #ece4d6;
}
#var-cinema .cin-chapter-en { font-family: var(--mono); font-size: 13px; letter-spacing: 0.28em; color: #b8a878; }

/* CINEMA node */
#var-cinema .cin-node { display: grid; padding: 80px 8vw; border-bottom: 1px solid rgba(216,200,168,0.08); }
#var-cinema .cin-node-inner {
  display: grid; grid-template-columns: 240px 1fr; gap: 80px; max-width: 1400px; margin: 0 auto; width: 100%;
}
#var-cinema .cin-side {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: #6a5a3a;
  position: sticky; top: 80px; align-self: start;
}
#var-cinema .cin-side-num {
  font-family: var(--display); font-size: 96px; font-weight: 900; line-height: 0.9;
  letter-spacing: -0.04em; color: #b8a878; margin-bottom: 24px;
}
#var-cinema .cin-side .side-row {
  border-top: 1px solid rgba(216,200,168,0.12); padding: 10px 0;
  display: flex; justify-content: space-between; gap: 12px;
}
#var-cinema .cin-side .side-row span:first-child { color: #4a3a2a; }
#var-cinema .cin-side .side-row span:last-child { color: #b8a878; text-align: right; }
#var-cinema .cin-body { border-top: 1px solid rgba(216,200,168,0.18); padding-top: 20px; }
#var-cinema .cin-body-meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; color: #6a5a3a; margin-bottom: 16px; }
#var-cinema .cin-body-title {
  font-family: var(--display); font-size: clamp(48px, 6vw, 88px); font-weight: 700;
  line-height: 0.95; letter-spacing: -0.02em; color: #ece4d6; margin: 0 0 8px;
}
#var-cinema .cin-body-titleen { font-family: var(--mono); font-size: 12px; letter-spacing: 0.32em; color: #b8a878; margin-bottom: 36px; }
#var-cinema .cin-body-summary { font-family: var(--serif); font-size: 22px; line-height: 1.55; color: #d8c8a8; margin: 0 0 32px; max-width: 720px; text-wrap: pretty; }
#var-cinema .cin-body-detail { font-size: 14px; line-height: 1.85; color: #9a8a6a; max-width: 720px; text-wrap: pretty; }
#var-cinema .cin-body-detail p { margin: 0 0 18px; }
#var-cinema .cin-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 32px; clear: both; }
#var-cinema .cin-tags span {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 5px 10px; border: 1px solid rgba(216,200,168,0.2); color: #b8a878;
}
#var-cinema .cin-quote-block {
  margin: 36px 0; padding: 28px 0 28px 36px; border-left: 2px solid #b3382e;
  font-family: var(--serif); font-style: italic; font-size: 22px; line-height: 1.55;
  color: #ece4d6; max-width: 720px;
}
#var-cinema .cin-quote-block .qa {
  display: block; margin-top: 14px; font-family: var(--mono); font-style: normal;
  font-size: 11px; letter-spacing: 0.2em; color: #6a5a3a;
}

/* CINEMA portrait — base */
#var-cinema .cin-portrait { margin: 0; }
#var-cinema .cin-portrait img { width: 100%; height: auto; display: block; filter: grayscale(0.3) contrast(1.04); }
#var-cinema .cin-portrait-meta {
  display: flex; justify-content: space-between; margin-top: 10px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: #b8a878; text-transform: uppercase;
}

/* === MEDIA LAYOUT I · full-bleed interlude === */
body[data-media="I"] #var-cinema .cin-portrait,
body[data-media="I"] #var-cinema .cin-storyboard {
  clear: both; float: none; width: auto; max-width: none;
  margin: 80px -8vw; padding: 80px 8vw;
  border-top: 1px solid rgba(216,200,168,0.18);
  border-bottom: 1px solid rgba(216,200,168,0.18);
  background: #000;
}
body[data-media="I"] #var-cinema .cin-portrait { padding: 80px 8vw; border-left: 0; border-right: 0; }
body[data-media="I"] #var-cinema .cin-portrait img {
  max-width: 720px; margin: 0 auto; filter: grayscale(0.2) contrast(1.05) brightness(1.05);
}
body[data-media="I"] #var-cinema .cin-portrait-meta {
  max-width: 720px; margin: 18px auto 0;
  border-top: 1px solid rgba(216,200,168,0.25); padding-top: 10px;
}

/* === MEDIA LAYOUT J · spread (image left, sticky meta right) === */
body[data-media="J"] #var-cinema .cin-portrait {
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: start;
  margin: 56px -120px 56px -120px;
  padding: 0;
}
body[data-media="J"] #var-cinema .cin-portrait img { filter: grayscale(0.2) contrast(1.06) brightness(1.05); }
body[data-media="J"] #var-cinema .cin-portrait-meta {
  display: block; margin-top: 0; align-self: end;
  border-top: 1px solid rgba(216,200,168,0.3); padding-top: 14px; line-height: 2;
}
body[data-media="J"] #var-cinema .cin-portrait-meta span { display: block; }
body[data-media="J"] #var-cinema .cin-portrait-meta span:last-child { color: #ece4d6; font-size: 14px; letter-spacing: 0.16em; margin-top: 4px; }
body[data-media="J"] #var-cinema .cin-storyboard {
  margin: 56px -120px 56px 0;
}

/* === MEDIA LAYOUT L · clip-path layered === */
body[data-media="L"] #var-cinema .cin-portrait {
  position: relative; width: 380px; max-width: 100%;
  margin: 40px 0 56px -60px; padding: 0;
  border: 0;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 32px), calc(100% - 56px) 100%, 0 100%);
}
body[data-media="L"] #var-cinema .cin-portrait::before {
  content: ''; position: absolute; top: -16px; left: -16px; right: 32px; bottom: 32px;
  border: 1px solid rgba(179,56,46,0.5); pointer-events: none; z-index: 0;
}
body[data-media="L"] #var-cinema .cin-portrait img {
  position: relative; z-index: 1; filter: grayscale(0.25) contrast(1.06) brightness(1.04);
}
body[data-media="L"] #var-cinema .cin-portrait-meta {
  position: relative; z-index: 1; margin-top: 0; padding: 8px 12px;
  background: #b3382e; color: #050505; border: 0;
}
body[data-media="L"] #var-cinema .cin-portrait-meta span,
body[data-media="L"] #var-cinema .cin-portrait-meta { color: #050505; }
body[data-media="L"] #var-cinema .cin-storyboard {
  width: 480px; margin: 40px -60px 56px auto;
}
#var-cinema .cin-portrait-meta {
  display: flex; justify-content: space-between; margin-top: 12px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: #b8a878; text-transform: uppercase;
}

/* CINEMA storyboard — 4-up frames */
#var-cinema .cin-storyboard-base { margin: 36px 0; }
#var-cinema .cin-sb-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; color: #b8a878;
  text-transform: uppercase; margin-bottom: 14px;
}
#var-cinema .cin-storyboard { margin: 36px 0; }
#var-cinema .cin-sb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
#var-cinema .cin-sb-frame {
  border: 1px solid rgba(216,200,168,0.2); background: rgba(216,200,168,0.04); padding: 8px;
}
#var-cinema .cin-sb-frame img { width: 100%; aspect-ratio: 4/3; object-fit: cover; filter: grayscale(0.3); }
#var-cinema .cin-sb-frame-meta {
  display: flex; justify-content: space-between; margin-top: 8px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; color: #b8a878;
}

/* ============================================================
   C · INDUSTRIAL TERMINAL — refined with openers + media
   ============================================================ */
#var-terminal {
  background: var(--term-bg, #0c0e0c);
  color: var(--term-fg, #c8e0c0);
  font-family: var(--mono);
  --term-rule: rgba(200,224,192,0.18);
  --term-rule-soft: rgba(200,224,192,0.12);
  --term-fg: #d8e8d0;
  --term-fg-dim: #6a8a60;
  --term-fg-mid: #9ab09a;
  --term-accent: #ff6b3d;
  --term-rec: #ff3838;
  --term-bg: #0a100a;
  --term-bg-2: #0c140c;
  --term-bg-3: #060a06;
}
/* COBALT — cold operations, deep blue + bone */
body[data-term-pal="cobalt"] #var-terminal {
  --term-bg: #061224; --term-bg-2: #0a1830; --term-bg-3: #04081a;
  --term-fg: #e8e0d0; --term-fg-mid: #9ab0c8; --term-fg-dim: #5a7898;
  --term-rule: rgba(232,224,208,0.18); --term-rule-soft: rgba(232,224,208,0.10);
  --term-accent: #ffb060; --term-rec: #ff5a3a;
}
/* BONE — bleached, near-black + cream ink */
body[data-term-pal="bone"] #var-terminal {
  --term-bg: #0e0d0a; --term-bg-2: #14120e; --term-bg-3: #08070a;
  --term-fg: #ebe4d6; --term-fg-mid: #b8a890; --term-fg-dim: #6a5e4a;
  --term-rule: rgba(235,228,214,0.18); --term-rule-soft: rgba(235,228,214,0.10);
  --term-accent: #b3382e; --term-rec: #b3382e;
}
:is(#var-terminal, #var-wiki) .term-statusbar {
  position: sticky; top: 0; z-index: 50; margin-bottom: 0;
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
  border-bottom: 1px solid var(--term-rule);
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--term-fg-dim);
  background: var(--term-bg-2); backdrop-filter: blur(6px);
}
:is(#var-terminal, #var-wiki) .term-statusbar > div { padding: 10px 16px; border-right: 1px solid var(--term-rule-soft, rgba(0,0,0,0.08)); }
:is(#var-terminal, #var-wiki) .term-statusbar strong { color: var(--term-fg, #2a2620); font-weight: 500; font-size: 12px; }
:is(#var-terminal, #var-wiki) .term-statusbar .stat-live { color: var(--term-rec, #b3382e); }
:is(#var-terminal, #var-wiki) .term-statusbar .stat-live::before {
  content: '● '; color: var(--term-rec, #b3382e);
  animation: term-blink 1.4s steps(2, end) infinite;
}
@keyframes term-blink { 50% { opacity: 0; } }

#var-terminal .term-hero {
  display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 100px);
  border-bottom: 1px solid var(--term-rule);
}
#var-terminal .term-hero-left {
  padding: 32px 24px; border-right: 1px solid var(--term-rule);

}
#var-terminal .term-hero-left .h-label { color: var(--term-accent); text-transform: uppercase; margin-top: 18px; }
#var-terminal .term-hero-left .h-label:first-child { margin-top: 0; }
#var-terminal .term-hero-left .h-val { color: var(--term-fg); font-size: 13px; letter-spacing: 0.08em; }
#var-terminal .term-hero-right { padding: 48px; display: grid; grid-template-rows: auto 1fr auto; }
#var-terminal .term-hero-id {
  font-size: 12px; letter-spacing: 0.22em; color: var(--term-accent); text-transform: uppercase;
  display: flex; justify-content: space-between;
  border-bottom: 1px solid var(--term-rule); padding-bottom: 12px;
}
#var-terminal .term-hero-zh {
  font-family: var(--serif); font-size: clamp(160px, 24vw, 360px); font-weight: 500;
  line-height: 0.82; letter-spacing: -0.01em; color: var(--term-fg); margin: 0;
  display: inline-block;
  position: relative;
  text-shadow: 0 0 32px color-mix(in srgb, var(--term-accent) 28%, transparent);
}
#var-terminal .term-hero-zh::before {
  content: '/ 0'; position: absolute; right: -4px; top: -8px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em; font-weight: 400;
  color: var(--term-accent);
  text-shadow: none;
}
#var-terminal .term-hero-zh::after {
  content: ''; position: absolute; left: 0; bottom: 6px; height: 1px; width: 64%;
  background: linear-gradient(90deg, var(--term-accent), transparent);
  opacity: 0.5;
}
#var-terminal .term-hero-en {
  display: flex; align-items: baseline; gap: 24px; margin-top: 24px;
  border-top: 1px solid var(--term-rule); padding-top: 16px;
  font-size: 15px; letter-spacing: 0.32em; color: var(--term-accent);
}
#var-terminal .term-hero-en .en-aka { color: var(--term-fg-dim); font-size: 12px; letter-spacing: 0.18em; }
#var-terminal .term-hero-quote {
  font-family: var(--serif); font-style: italic; font-size: 26px; line-height: 1.5;
  color: var(--term-accent); border-left: 2px solid var(--term-accent); padding-left: 24px; max-width: 640px;
}
#var-terminal .term-hero-quote .qa {
  display: block; margin-top: 14px; font-family: var(--mono); font-style: normal;
  font-size: 11px; letter-spacing: 0.2em; color: var(--term-fg-dim); text-transform: uppercase;
}

/* TERMINAL — full-bleed opener with poster mounted in CRT-style frame */
#var-terminal .term-opener {
  display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh;
  border-bottom: 1px solid var(--term-rule); background: var(--term-bg-3);
}
#var-terminal .term-opener-img {
  position: relative; overflow: hidden;
  border-right: 1px solid var(--term-rule);
  background-size: cover; background-position: center;
}
#var-terminal .term-opener-img {
  filter: brightness(1.2) contrast(1.05);
  animation: term-crt-flicker 5.7s steps(60) infinite;
}
/* Static scanlines + vignette (always on) */
#var-terminal .term-opener-img::before {
  content: ''; position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.12) 2px 3px),
    radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
  pointer-events: none;
  mix-blend-mode: multiply;
}
/* Animated horizontal sweep + drifting scanline pattern — pseudo-element on a wrapper class */
#var-terminal .term-opener-img {
  --crt-shift: 0px;
}
#var-terminal .term-opener-img::after {
  z-index: 2;
}
#var-terminal .term-opener-img > .term-crt-overlay {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.025) 3px 4px);
  background-size: 100% 4px;
  background-repeat: repeat;
  background-position: 0 0;
  animation: term-crt-scanlines 4.2s linear infinite;
  mix-blend-mode: screen;
  opacity: 0.55;
}
@keyframes term-crt-scanlines {
  0%   { background-position: 0 0; }
  100% { background-position: 0 4px; }
}
@keyframes term-crt-flicker {
  0%, 100% { filter: brightness(1.20) contrast(1.05); }
  4%       { filter: brightness(1.30) contrast(1.08); }
  5%       { filter: brightness(1.10) contrast(1.02); }
  6%       { filter: brightness(1.26) contrast(1.07); }
  18%      { filter: brightness(1.14) contrast(1.03); }
  22%      { filter: brightness(1.28) contrast(1.07); }
  44%      { filter: brightness(1.13) contrast(1.03); }
  46%      { filter: brightness(1.30) contrast(1.08); }
  47%      { filter: brightness(1.18) contrast(1.04); }
  62%      { filter: brightness(1.27) contrast(1.07); }
  72%      { filter: brightness(1.12) contrast(1.03); }
  86%      { filter: brightness(1.10) contrast(1.02); }
  87%      { filter: brightness(1.32) contrast(1.09); }
  88%      { filter: brightness(1.16) contrast(1.04); }
}
@media (prefers-reduced-motion: reduce) {
  #var-terminal .term-opener-img,
  #var-terminal .term-opener-img > .term-crt-overlay {
    animation: none !important;
  }
}
#var-terminal .term-opener-img::after {
  content: 'IMG REF · ' attr(data-ref);
  position: absolute; left: 16px; bottom: 16px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; color: var(--term-accent);
  text-transform: uppercase;
  background: color-mix(in srgb, var(--term-bg-3) 70%, transparent); padding: 4px 8px;
  border: 1px solid color-mix(in srgb, var(--term-accent) 40%, transparent);
}
#var-terminal .term-opener-mid { padding: 60px 48px; display: grid; grid-template-rows: auto 1fr auto; }
#var-terminal .term-opener-meta {
  display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.22em;
  color: var(--term-accent); text-transform: uppercase;
  border-bottom: 1px solid var(--term-rule); padding-bottom: 14px;
}
#var-terminal .term-opener-num {
  font-family: var(--sans); font-size: clamp(180px, 24vw, 360px); font-weight: 900;
  line-height: 0.85; letter-spacing: -0.06em; color: var(--term-fg); align-self: center; margin: 32px 0;
}
#var-terminal .term-opener-logo {
  display: flex; align-items: center; gap: 18px;
  padding: 18px 0 0; border-top: none;
  margin-top: 4px;
}
#var-terminal .term-opener-logo img {
  width: 88px; height: 88px; object-fit: contain;
  filter: drop-shadow(0 0 12px color-mix(in srgb, var(--term-accent) 35%, transparent));
}
#var-terminal .term-opener-logo-cap { display: grid; gap: 4px; }
#var-terminal .term-opener-logo-zh {
  font-family: var(--sans); font-size: 14px; letter-spacing: 0.18em;
  color: var(--term-fg); font-weight: 600;
}
#var-terminal .term-opener-logo-en {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em;
  color: var(--term-accent); text-transform: uppercase;
}
#var-terminal .term-opener-titles {
  border-top: 1px solid var(--term-rule); padding-top: 18px;
}
#var-terminal .term-opener-zh {
  font-family: var(--sans); font-size: clamp(40px, 5vw, 64px); font-weight: 800;
  letter-spacing: 0.02em; color: var(--term-fg); margin: 0 0 6px;
}
#var-terminal .term-opener-en { font-size: 12px; letter-spacing: 0.3em; color: var(--term-accent); margin-bottom: 24px; }
#var-terminal .term-opener-summary {
  font-family: var(--serif); font-size: 20px; line-height: 1.55; color: var(--term-fg);
  margin: 0 0 18px; text-wrap: pretty;
}
#var-terminal .term-opener-summary p { margin: 0 0 14px; }
#var-terminal .term-opener-detail {
  font-size: 12px; line-height: 1.85; color: var(--term-fg-dim); text-wrap: pretty;
}
#var-terminal .term-opener-detail p { margin: 0 0 10px; }
#var-terminal .term-opener-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 18px;
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--term-accent);
}
#var-terminal .term-opener-tags span { padding: 4px 10px; border: 1px solid color-mix(in srgb, var(--term-accent) 30%, transparent); }

/* TERMINAL chapter-block — wraps each chapter */
#var-terminal .term-chapter-block { position: relative; }

/* TERMINAL faction span — groups consecutive same-faction chapters */
#var-terminal .term-faction-span { position: relative; }

/* Faction span: the mark sticks for the WHOLE span, morphs from large→banner */
#var-terminal .term-faction-span { position: relative; }
#var-terminal .term-faction-spacer {
  height: 373px; /* gives banner ~720px total morph distance (mark height ~347 + spacer 373) before chapters appear */
  pointer-events: none;
}
#var-terminal .term-faction-hero {
  display: none;
}
/* The mark is a direct child of .term-faction-span — sticks for the whole span.
   Inline CSS var --p (0..1) drives smooth scroll-progress interpolation. */
#var-terminal .term-faction-mark {
  --p: 0;
  position: sticky; top: 98px; z-index: 30;
  display: flex; flex-direction: row; align-items: center; justify-content: center;
  gap: calc(28px - 12px * var(--p));
  padding: calc(28px - 22px * var(--p)) 28px;
  background: var(--term-bg);
  border-bottom: 1px solid color-mix(in srgb, var(--term-rule) calc(100% * var(--p)), transparent);
  will-change: padding, gap;
}
#var-terminal .term-faction-mark img {
  width: calc(280px - 244px * var(--p)); /* 280 → 36 */
  height: auto;
  filter: drop-shadow(0 0 calc(24px - 18px * var(--p)) color-mix(in srgb, var(--term-accent) 35%, transparent));
}
#var-terminal .faction-visgant .term-faction-mark img,
#var-terminal .faction-cu .term-faction-mark img {
  filter: drop-shadow(0 0 calc(32px - 24px * var(--p)) color-mix(in srgb, #d4a23a 50%, transparent));
}
#var-terminal .term-faction-cap {
  display: flex; align-items: flex-start;
  flex-direction: column;
  gap: calc(8px - 4px * var(--p));
  text-align: left;
}
#var-terminal .term-faction-zh {
  font-family: var(--sans);
  font-size: calc(30px - 18px * var(--p));
  letter-spacing: calc(0.32em - 0.10em * var(--p));
  color: var(--term-fg); font-weight: 600;
}
#var-terminal .term-faction-en {
  font-family: var(--mono);
  font-size: calc(12px - 2px * var(--p));
  letter-spacing: calc(0.40em - 0.12em * var(--p));
  color: var(--term-accent); text-transform: uppercase;
}

/* HIVE — ominous blood red overrides (chapter VI) */
#var-terminal .term-chapter-block.is-hive {
  --hive-red: #8a1f1a;
  --hive-red-bright: #c0322a;
}
#var-terminal .term-chapter-block.is-hive .term-chapter-zh,
#var-terminal .term-chapter-block.is-hive .term-chapter-num,
#var-terminal .term-chapter-block.is-hive .term-opener-zh,
#var-terminal .term-chapter-block.is-hive .term-opener-num,
#var-terminal .term-chapter-block.is-hive .term-node-zh {
  color: var(--hive-red-bright);
  text-shadow: 0 0 18px color-mix(in srgb, var(--hive-red) 60%, transparent);
}
#var-terminal .term-chapter-block.is-hive .term-chapter-en,
#var-terminal .term-chapter-block.is-hive .term-opener-en,
#var-terminal .term-chapter-block.is-hive .term-node-en {
  color: var(--hive-red);
}

/* ===================== EPILOGUE — chapter IX (dawn after sea of light) ===================== */
/* Sea-of-light: gracefully dissolve the last chapter's bottom edge into the
   epilogue's deep navy, so there's no horizontal seam.  Apply a bottom-fade
   gradient overlay to every sea-of-light chapter-inner — only the last one is
   visible at the boundary, but it's invisible mid-section because the next
   chapter covers it. */
#var-terminal .term-chapter-block.is-sealight {
  position: relative;
  isolation: isolate;
}
#var-terminal .term-chapter-block.is-sealight::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 280px;
  pointer-events: none; z-index: 4;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(2,6,13,0.0)  20%,
    rgba(2,6,13,0.45) 55%,
    rgba(2,6,13,0.9)  85%,
    #02060d 100%);
}

/* ===== EPILOGUE / 余生 — Sea-of-Light continuation, dawn rising =====
   Continues the sea-of-light bone/cyan palette but slowly warms and brightens — the sea-of-light bone/cyan palette but slowly warms and brightens —
   from deep ghost blue at the top to a soft pre-dawn warm bone-cream at the bottom.
   No faction banner (rendered outside spans), no node grid, no terminal chrome.
   Sticky status bar fades out when entering — feels like leaving the archive. */
#var-terminal .term-chapter-block.is-epilogue {
  --epi-deep:  #02060d;   /* matches sea-of-light end at top — seamless join */
  --epi-mid:   #0a1828;   /* sea-of-light deep blue */
  --epi-warm:  #1a2438;
  --epi-dawn:  #2a2a32;
  --epi-bone:  #d8d2c4;
  --epi-bone-soft: rgba(216,210,196,0.62);
  --epi-bone-faint: rgba(216,210,196,0.32);
  background: linear-gradient(
    180deg,
    var(--epi-deep)  0%,
    var(--epi-deep) 12%,
    var(--epi-mid)  30%,
    var(--epi-warm) 60%,
    var(--epi-dawn) 100%
  );
  padding: 280px 0 320px;
  position: relative;
  isolation: isolate;
}
/* Soft horizontal tide bands carried over from ghost mode — fading as we descend.
   ::before starts FROM 280px down so the epilogue's first 280px is pure --epi-deep
   matching the sea-of-light fade-to color exactly — no horizontal seam. */
#var-terminal .term-chapter-block.is-epilogue::before {
  content: '';
  position: absolute; left: 0; right: 0;
  top: 280px; bottom: 0;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 30% at 50% 0%, rgba(180,230,250,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(232,210,170,0.10) 0%, transparent 70%);
}
/* Removed the ::after horizontal hairline — replaced with two vertical dissolve traces */
#var-terminal .term-chapter-block.is-epilogue::after {
  content: '';
  position: absolute; left: 0; right: 0; top: 0; height: 240px;
  pointer-events: none;
  background:
    /* Two narrow vertical light shafts that dissolve from sea-of-light tide into nothing */
    linear-gradient(180deg, rgba(180,230,250,0.18) 0%, transparent 100%) left  20% / 1px 100% no-repeat,
    linear-gradient(180deg, rgba(180,230,250,0.18) 0%, transparent 100%) right 20% / 1px 100% no-repeat;
}
#var-terminal .term-chapter-block.is-epilogue .term-chapter-inner {
  background: transparent;
  border: 0;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 48px;
  position: relative;
  z-index: 1;
}
#var-terminal .term-epilogue {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  position: relative;
}
/* Sealed-envelope opening device: a single small mark, no rule */
#var-terminal .term-epilogue-rule {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(216,210,196,0.55);
  box-shadow: 0 0 18px rgba(180,230,250,0.5);
  margin: 0 0 88px;
}
#var-terminal .term-epilogue-meta {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.4em;
  color: rgba(180,230,250,0.45); text-transform: uppercase;
  margin-bottom: 64px;
}
/* Stylish display title: oversize serif italic, generous tracking, soft halo */
#var-terminal .term-epilogue-zh {
  font-family: var(--serif, var(--sans));
  font-weight: 300; font-style: italic;
  font-size: clamp(72px, 8vw, 104px);
  letter-spacing: 0.1em;
  line-height: 1;
  color: #f0eadc;
  margin: 0 0 18px;
  text-shadow:
    0 0 30px rgba(180,230,250,0.18),
    0 0 80px rgba(232,210,170,0.10);
}
#var-terminal .term-epilogue-en {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.5em;
  color: rgba(216,222,228,0.42); text-transform: uppercase;
  margin-bottom: 96px;
}
#var-terminal .term-epilogue-summary {
  font-family: var(--serif, var(--sans));
  font-size: 19px; line-height: 2.0; font-weight: 300;
  color: #ece6d6; letter-spacing: 0.03em;
  max-width: 540px; margin: 0 auto 56px;
  text-align: center;
}
/* First-letter drop accent for summary — subtle but elevating */
#var-terminal .term-epilogue-summary::first-letter {
  font-style: italic;
  color: #f6efde;
}
#var-terminal .term-epilogue-detail {
  font-family: var(--sans); font-size: 14px; line-height: 2.15;
  color: rgba(220,212,196,0.78); letter-spacing: 0.04em;
  max-width: 540px; margin: 0 auto;
  text-align: left;
}
#var-terminal .term-epilogue-detail p { margin: 0 0 26px; }
#var-terminal .term-epilogue-detail p:last-child { margin-bottom: 0; }
/* Pull quote — large italic serif, no chrome, just air */
#var-terminal .term-epilogue-quote {
  font-family: var(--serif, var(--sans));
  font-style: italic; font-weight: 300;
  font-size: 22px; line-height: 1.6; letter-spacing: 0.04em;
  color: rgba(240,232,212,0.88); text-transform: none;
  border: 0; padding: 96px 0 0; margin: 0 auto;
  max-width: 520px; text-align: center;
  position: relative;
}
#var-terminal .term-epilogue-quote::before {
  content: '“';
  display: block;
  font-family: var(--serif, var(--sans));
  font-style: italic; font-weight: 300;
  font-size: 80px; line-height: 0.4;
  color: rgba(216,210,196,0.32);
  margin-bottom: 28px;
}
#var-terminal .term-epilogue-quote .qa {
  display: block; margin-top: 28px;
  font-family: var(--mono); font-size: 10px;
  font-style: normal;
  color: rgba(232,222,200,0.42); letter-spacing: 0.32em;
  text-transform: uppercase;
}
#var-terminal .term-epilogue-end {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.6em;
  color: rgba(232,222,200,0.32); text-transform: uppercase;
  margin-top: 160px;
  display: flex; align-items: center; gap: 20px;
}
#var-terminal .term-epilogue-end::before,
#var-terminal .term-epilogue-end::after {
  content: ''; width: 80px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(232,222,200,0.28), transparent);
}

/* When epilogue is in view, fade the sticky status bar + faction banners */
#var-terminal.is-epilogue-active .term-statusbar,
#var-terminal.is-epilogue-active .term-faction-mark {
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.4s ease-out;
}
#var-terminal .term-statusbar,
#var-terminal .term-faction-mark {
  transition: opacity 0.6s ease-in;
}

/* ===================== SEA OF LIGHT — chapter VIII ===================== */
/* Three terminal-native modes — keeps the typeface system (sans + mono),
   adds cinematic CRT effects to elevate the finale. */

#var-terminal .term-chapter-block.is-sealight {
  --sl-bone: #e8eef5;
  --sl-cyan: #6fc8e0;
  --sl-deep: #050a16;
  position: relative;
}
#var-terminal .term-chapter-block.is-sealight .term-faction-mark img,
#var-terminal .term-chapter-block.is-sealight .term-opener-logo img {
  filter: drop-shadow(0 0 14px color-mix(in srgb, var(--sl-bone) 50%, transparent)) brightness(0.9) saturate(0.45);
}

/* ----- SIGNAL — heavy CRT: chromatic split, RGB ghosts, hard scanlines ----- */
#var-terminal .is-sealight.sl-mode-signal .term-chapter-inner {
  background: #02060f;
  position: relative;
  isolation: isolate;
}
#var-terminal .is-sealight.sl-mode-signal .term-chapter-inner::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background:
    repeating-linear-gradient(0deg,
      transparent 0 2px,
      rgba(120,200,230,0.08) 2px 3px),
    radial-gradient(ellipse 100% 60% at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);
}
#var-terminal .is-sealight.sl-mode-signal .term-chapter-inner::after {
  display: none;
}
#var-terminal .is-sealight.sl-mode-signal .term-opener,
#var-terminal .is-sealight.sl-mode-signal .term-chapter,
#var-terminal .is-sealight.sl-mode-signal .term-node {
  background: transparent !important;
  border-color: rgba(140,210,230,0.18) !important;
  position: relative; z-index: 2;
}
#var-terminal .is-sealight.sl-mode-signal .term-opener-img {
  filter: brightness(0.55) contrast(1.15) saturate(0.4) hue-rotate(180deg);
}
/* Chromatic-aberration style title — uses CSS text-shadow tricks */
#var-terminal .is-sealight.sl-mode-signal .term-opener-zh,
#var-terminal .is-sealight.sl-mode-signal .term-chapter-zh,
#var-terminal .is-sealight.sl-mode-signal .term-opener-num,
#var-terminal .is-sealight.sl-mode-signal .term-chapter-num,
#var-terminal .is-sealight.sl-mode-signal .term-node-zh {
  color: #e8f4fa;
  text-shadow:
    -2px 0 0 rgba(255,80,130,0.55),
     2px 0 0 rgba(80,200,255,0.55),
     0 0 30px rgba(180,230,250,0.35);
}
@keyframes sl-signal-jitter-unused {
  0%   { transform: translateX(0); }
  50%  { transform: translateX(0.5px); }
  100% { transform: translateX(0); }
}
#var-terminal .is-sealight.sl-mode-signal .term-opener-en,
#var-terminal .is-sealight.sl-mode-signal .term-chapter-en,
#var-terminal .is-sealight.sl-mode-signal .term-node-en,
#var-terminal .is-sealight.sl-mode-signal .term-opener-meta,
#var-terminal .is-sealight.sl-mode-signal .term-opener-tags {

/* TERMINAL chapter (no media) */
#var-terminal .term-chapter {
  display: grid; grid-template-columns: 80px 1fr 80px; min-height: 50vh;
  border-bottom: 1px solid var(--term-rule);
  background: linear-gradient(180deg, var(--term-bg-2) 0%, var(--term-bg) 100%);
}
#var-terminal .term-chapter-tick {
  border-right: 1px solid var(--term-rule); position: relative;
  background-image: repeating-linear-gradient(180deg, transparent 0 39px, var(--term-rule) 39px 40px);
}
#var-terminal .term-chapter-tick:last-child { border-right: 0; border-left: 1px solid var(--term-rule); }
#var-terminal .term-chapter-mid { padding: 60px 48px; display: grid; grid-template-rows: auto 1fr auto; }
#var-terminal .term-chapter-meta {
  display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.22em;
  color: var(--term-accent); text-transform: uppercase;

}

  font-family: var(--sans); font-size: clamp(180px, 24vw, 360px); font-weight: 900;

}

  margin: 32px 0;
}

#var-terminal .term-chapter-emblem {

// Build alias lookup: longest aliases first so we don't match "罗兹涅" inside "罗兹涅战争"
const WIKI_ALIAS_MAP = (() => {
  const entries = [];
  for (const slug of Object.keys(WIKI_PAGES)) {
    for (const a of (WIKI_PAGES[slug].aliases || [])) entries.push([a, slug]);
  }
  // 易渊 → his own subpage (the timeline hero is rendered at #/p/yiyuan)
  entries.push(['易渊', 'yiyuan']);
  entries.sort((a, b) => b[0].length - a[0].length);
  return entries;
})();

// resolve a slug to its href; home (#/) is the catalog index
function wikiHref(slug) { return `#/p/${slug}`; }

// Linkify: takes ALREADY-ESCAPED html, wraps occurrences of wiki aliases in <a class="wiki-link">.
// To avoid double-wrapping, we walk text outside of any <a> we already inserted.
function linkifyWiki(escapedHtml) {
  if (!escapedHtml) return '';
  let out = escapedHtml;
  for (const [alias, slug] of WIKI_ALIAS_MAP) {
    // Only first occurrence per chunk gets linked, to avoid noise. Use a regex with negative lookbehind for already-linked.
    const escAlias = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Match alias not already inside an <a ...>...alias...</a>; we use a placeholder split approach.
    const re = new RegExp(`(?<![\\w])${escAlias}(?![^<]*</a>)`, '');
    if (re.test(out)) {
      out = out.replace(re, `<a class="wiki-link" href="${wikiHref(slug)}">${alias}</a>`);
    }
  }
  return out;
}

function detailHtml(d) {
  if (!d) return '';
  // On 易渊's own page (the timeline hero), don't auto-link his name
  return d.split('\n\n').map(p => `<p>${linkifyWikiExclude(esc(p), 'yiyuan')}</p>`).join('');
}

// Asset path mapper — exploration is in /explorations/ so "assets/x" → "assets/x" (we copied)
function assetPath(p) {
  if (!p) return '';
  return p.startsWith('assets/') ? p : p;
}

// Walk nodes in order, splitting into chapters with their opener (if any)
function buildChapters() {
  const chapters = [];
  const seen = new Map();
  for (const n of NODES) {
    if (!seen.has(n.chapterEn)) {
      const idx = chapters.length;
      seen.set(n.chapterEn, idx);
      chapters.push({ chapter: n.chapter, chapterEn: n.chapterEn, opener: null, nodes: [] });
    }
    const ch = chapters[seen.get(n.chapterEn)];
    if (isOpener(n)) ch.opener = n;
    else ch.nodes.push(n);
  }
  return chapters;
}

  };
  const CHAPTER_FACTION = {
    'I. ORIGIN':                          'rozne',
    'II. IN THE ANDESVOLL MOUNTAINS':     'rozne',

  };
  const HIDDEN_CHAPTERS = new Set();
  const EPILOGUE_CHAPTERS = new Set(['IX. AFTER']);

  // Build faction spans: consecutive (visible) NON-epilogue chapters sharing a faction.
  // Epilogue chapters are kept aside so they render OUTSIDE any faction span (no banner).
  const visible = chapters.filter(c => !HIDDEN_CHAPTERS.has(c.chapterEn));
  const spans = [];
  const epilogueChapters = [];
  visible.forEach(ch => {
    if (EPILOGUE_CHAPTERS.has(ch.chapterEn)) { epilogueChapters.push(ch); return; }
    const fid = CHAPTER_FACTION[ch.chapterEn];
    const last = spans[spans.length - 1];
    if (last && last.fid === fid) last.chapters.push(ch);
    else spans.push({ fid, chapters: [ch] });
  });

  let body = '';
  spans.forEach((span, sIdx) => {
    const faction = FACTIONS[span.fid];
    const factionHero = faction ? `
      <div class="term-faction-mark" data-faction="${faction.id}">
        <img src="${faction.src}" alt="${esc(faction.zh)}" />
        <div class="term-faction-cap">

          <div class="term-faction-en">${esc(faction.en)}</div>
        </div>

    ` : '';

    body += `<section class="term-faction-span faction-${faction.id}" data-faction="${faction.id}">${factionHero}`;

    span.chapters.forEach(ch => {
      const i = chapters.indexOf(ch);
      const isHive = ch.chapterEn === 'VI. THE HIVE';
      const isSeaLight = ch.chapterEn === 'VIII. SEA OF LIGHT';
      const blockClasses = ['term-chapter-block'];
      if (isHive) blockClasses.push('is-hive');
      if (isSeaLight) blockClasses.push('is-sealight', 'sl-mode-' + (document.body.dataset.slMode || 'ghost'));

      body += `<section class="${blockClasses.join(' ')}" data-chapter="${esc(ch.chapterEn)}"><div class="term-chapter-inner">${isSeaLight ? '<div class="sl-tide"></div>' : ''}`;

      if (ch.opener && ch.opener.poster) {
        const op = ch.opener;
        body += `
          <section class="term-opener">
            <div class="term-opener-img" data-ref="${esc(op.code || '')}" style="background-image: url('${assetPath(op.poster)}')"><div class="term-crt-overlay"></div></div>
            <div class="term-opener-mid">
              <div class="term-opener-meta">
                <span>CHAPTER · ${String(i+1).padStart(2,'0')} / ${chapters.length}</span>
                <span>${esc(op.year || '')}</span>
              </div>
              <div class="term-opener-num">${String(i+1).padStart(2,'0')}</div>
              <div class="term-opener-titles">
                <h2 class="term-opener-zh">${esc(op.title || ch.chapter)}</h2>
                <div class="term-opener-en">// ${esc(op.titleEn || ch.chapterEn)}</div>
                <div class="term-opener-summary">${detailHtml(op.summary || '')}</div>
                ${op.detail ? `<div class="term-opener-detail">${detailHtml(op.detail)}</div>` : ''}
                <div class="term-opener-tags">${(op.tags||[]).map(t => `<span>${esc(t)}</span>`).join('')}</div>
              </div>
            </div>
          </section>
        `;
      } else {
        const op = ch.opener;
        body += `
          <section class="term-chapter">
            <div class="term-chapter-tick"></div>
            <div class="term-chapter-mid">
              <div class="term-chapter-meta">
                <span>CHAPTER · ${String(i+1).padStart(2,'0')} / ${chapters.length}</span>
                <span>${esc((op && op.year) || ch.nodes[0]?.year || '')}</span>
              </div>
              <div class="term-chapter-numrow">
                <div class="term-chapter-num">${String(i+1).padStart(2,'0')}</div>
                ${ch.chapterEn === 'III. TEN YEARS AT THE 11TH BUREAU' ? `<img class="term-chapter-emblem" src="assets/bureau11-logo.png" alt="第十一特别行动局" />` : ''}
              </div>
              <div class="term-chapter-titles">
                <span class="term-chapter-zh">${esc(ch.chapter)}</span>
                <span class="term-chapter-en">// ${esc(ch.chapterEn)}</span>
              </div>
              ${op && op.summary ? `<p class="term-node-summary" style="margin-top:24px;">${esc(op.summary)}</p>` : ''}
              ${op && op.detail ? `<div class="term-node-detail">${detailHtml(op.detail)}</div>` : ''}
            </div>
            <div class="term-chapter-tick"></div>
          </section>
        `;
      }

      ch.nodes.forEach((n, j) => {
        let media = '';
      if (n.portrait) {
        media += `
          <figure class="term-portrait">
            <img src="${assetPath(n.portrait.src)}" alt="${esc(n.portrait.alt || '')}" loading="lazy" />
            <figcaption class="term-portrait-meta">
              <span>${esc(n.portrait.tc || '')}</span>
              <span>${esc(n.portrait.label || '')}</span>
            </figcaption>
          </figure>
        `;
      }
      if (n.storyboard) {
        media += `
          <div class="term-storyboard">
            <div class="term-sb-label">▸ ${esc(n.storyboard.titleEn || '')} · ${esc(n.storyboard.title || '')}</div>
            <div class="term-sb-grid">
              ${n.storyboard.frames.map(f => `
                <figure class="term-sb-frame">
                  <img src="${assetPath(f.src)}" alt="" loading="lazy" />
                  <figcaption class="term-sb-frame-meta">
                    <span>${esc(f.tc || '')}</span>
                    <span>${esc(f.label || '')}</span>
                  </figcaption>
                </figure>
              `).join('')}
            </div>
          </div>
        `;
      }
      body += `
        <article class="term-node">
          <div class="term-node-num">NODE<span>${String(j+1).padStart(2,'0')}</span></div>
          <div class="term-node-body">
            <header class="term-node-head">
              <div>CODE<strong>${esc(n.code || '')}</strong></div>
              <div>YEAR<strong>${esc(n.year || '')}</strong></div>
              <div>AGE<strong>${esc(n.age || '')}</strong></div>

            <div class="term-node-title">
              <h3 class="term-node-zh">${esc(n.title || '')}</h3>
              <span class="term-node-en">// ${esc(n.titleEn || '')}</span>
            </div>
            ${n.location ? `<div class="term-node-loc">▸ ${esc(n.locationEn || '')} · ${esc(n.location)}</div>` : ''}
            <p class="term-node-summary">${esc(n.summary || '')}</p>
            <div class="term-node-detail">${detailHtml(n.detail)}</div>
            ${n.quote ? `<blockquote class="term-quote">${esc(n.quote)}${n.quoteAttr ? `<span class="qa">${esc(n.quoteAttr)}</span>` : ''}</blockquote>` : ''}
            ${media}

          <div class="term-node-rule"></div>
        </article>
      `;
      });

      body += `</div></section>`;

    body += `</section>`;
  });

  // Epilogue: rendered as bare chapter blocks OUTSIDE any faction span, so no
  // sticky banner appears for them. Stripped-down layout — only chapter title,

  epilogueChapters.forEach(ch => {
    const op = ch.opener || (ch.nodes && ch.nodes[0]) || {};
    body += `

  const topbar = `

      <span>INDEX / <strong style="color:var(--term-fg);font-weight:500;">易渊 · YI YUAN</strong></span>
    </div>
  `;
  // Push the recording status bar below the topbar
  const statusAdjusted = status.replace('top: 0', 'top: 33px').replace('class="term-statusbar"', 'class="term-statusbar" style="top:33px"');
  root.innerHTML = topbar + statusAdjusted + hero + body;
}

// =========== D · WIKI sub-page render + router ===========

// Per-entry status bar (出现在所有词条顶部). Returns the recording-style sticky bar.
function docStatusBarHtml(slug, page, isYiyuan) {
  const KIND_PREFIX = {
    '人物': 'PER', '组织': 'ORG', '地点': 'LOC', '事件': 'EVT',
    '物质': 'MAT', '装备': 'EQP', '概念': 'CON', '现象': 'PHN'
  };
  const slugs = Object.keys(WIKI_PAGES);
  const idx = slugs.indexOf(slug) + 1;
  const num = String(idx).padStart(4, '0');
  const kp = KIND_PREFIX[page.kind] || 'IDX';
  const fileRef = page.fileRef || `11-IDX-${kp}-${num}`;
  const subjBase = (page.en || page.zh || slug).toUpperCase();
  const clearance = page.clearance || 'ONYX';
  return `
    <div class="term-statusbar">
      <div>FILE-REF · <strong>${esc(fileRef)}</strong></div>
      <div>SUBJECT · <strong>${esc(subjBase)}</strong></div>
      <div>CLEARANCE · <strong>${esc(clearance)}</strong></div>
      <div class="stat-live">REC · 雁历 81</div>
    </div>
  `;
}

function renderWiki(slug) {
  const root = document.getElementById('var-wiki');
  const page = WIKI_PAGES[slug];
  if (!page) {
      root.innerHTML = `
      ${docStatusBarHtml(slug, {kind: '未知', en: slug, zh: slug, clearance: '404'}, false)}
      <div class="wiki-topbar">
        <a class="wiki-back" href="#/">← 词条目录</a>
        <span class="wiki-crumb">条目不存在 · ${esc(slug)}</span>
      </div>
      <div class="wiki-page">
        <div class="wiki-empty">未找到该条目。</div>
      </div>
    `;
    return;
  }

  // Find related timeline nodes — any node whose summary/detail/title mentions one of this page's aliases.
  const aliases = page.aliases || [];
  const related = NODES.filter(n => {
    if (isOpener(n)) return false; // skip openers/epilogue, list real nodes
    const blob = (n.title || '') + ' ' + (n.summary || '') + ' ' + (n.detail || '');
    return aliases.some(a => blob.includes(a));
  }).slice(0, 12);

  const summaryHtml = page.summary
    ? page.summary.split('\n\n').map(p => `<p>${linkifyWikiExclude(esc(p), slug)}</p>`).join('')
    : '<p class="wiki-empty">// 待补完</p>';

  const metaHtml = (page.meta || []).map(([k, v]) =>
    `<div class="wm-row"><div class="wm-key">${esc(k)}</div><div class="wm-val">${linkifyWikiExclude(esc(v), slug)}</div></div>`
  ).join('');

  const relatedHtml = related.length
    ? related.map(n => `
        <li>
          <span class="wr-code">${esc((n.code || '').split('/')[0].trim())}</span>
          <a href="#/" data-node-id="${esc(n.id)}">${esc(n.title)}</a>
          <span class="wr-chap">${esc(n.chapterEn || '')}</span>
        </li>
      `).join('')
    : '<div class="wiki-empty">暂无关联时间线条目。</div>';

  root.innerHTML = `
    ${docStatusBarHtml('yiyuan', WIKI_PAGES.yiyuan, true)}
    <div class="wiki-topbar">
      <a class="wiki-back" href="#/">← 词条目录</a>
      <span class="wiki-crumb">INDEX / <strong>${esc(page.zh)}</strong></span>
    </div>
    ${page.profile ? renderProfileHero(page, slug, summaryHtml) : `
    <div class="wiki-page">
      <div class="wiki-kind">
        <span>${esc(page.kind || '条目')}</span>
        <span class="wk-slug">// ${esc(slug.toUpperCase())}</span>
      </div>
      <h1 class="wiki-zh">${esc(page.zh)}</h1>
      <div class="wiki-en">${esc(page.en)}</div>
      ${page.logo ? `<div class="wiki-faction-logo"><img src="${esc(page.logo)}" alt="${esc(page.zh)} logo"></div>` : ''}
      <div class="wiki-summary">${summaryHtml}</div>
      ${metaHtml ? `<div class="wiki-meta">${metaHtml}</div>` : ''}
      <div class="wiki-related-label">相关条目 // RELATED ENTRIES</div>
      <ul class="wiki-related-list">${relatedHtml}</ul>
    </div>
    `}
    ${page.profile ? `
    <div class="wiki-page is-profile-bottom" style="padding:0 48px;max-width:1180px;">
      ${metaHtml ? `<div class="wiki-meta">${metaHtml}</div>` : ''}
      <div class="wiki-related-label">相关条目 // RELATED ENTRIES</div>
      <ul class="wiki-related-list">${relatedHtml}</ul>
    </div>
    ` : ''}
  `;

  // Wire related-link clicks: jump back to main timeline scrolled to that node
  root.querySelectorAll('a[data-node-id]').forEach(a => {
    a.addEventListener('click', (ev) => {
      ev.preventDefault();
      const id = a.getAttribute('data-node-id');
      location.hash = '#/p/yiyuan';
      // Wait one tick for route() to switch view, then scroll to node
      setTimeout(() => {
        const target = document.querySelector(`#var-terminal [data-node-id="${id}"]`)
          || Array.from(document.querySelectorAll('#var-terminal .term-node')).find(el => (el.querySelector('.term-node-zh')?.textContent || '').trim() === NODES.find(n=>n.id===id)?.title);
        if (target) target.scrollIntoView({ block: 'start' });
      }, 60);
    });
  });
}

function renderProfileHero(page, slug, summaryHtml) {
  const stats = (page.stats || []).map(([k, v]) =>
    `<div class="ps-row"><div class="ps-key">${esc(k)}</div><div class="ps-val">${linkifyWikiExclude(esc(v), slug)}</div></div>`
  ).join('');
  const quote = page.quote
    ? `<div class="profile-quote">「${esc(page.quote)}」</div>`
    : '';
  return `
    <div class="profile-banner">
      <span class="pb-mark">PROFILE / 档案</span>
      <span class="pb-zh">${esc(page.zh)}</span>
      <span class="pb-spacer"></span>
      <span class="pb-tag">${esc(page.kind || '人物')}</span>
      <span class="pb-tag">// ${esc(slug.toUpperCase())}</span>
    </div>
    <div class="wiki-page is-profile">
      <div class="profile-shell">
        <aside class="profile-side">
          <div class="profile-portrait"></div>
          ${stats ? `<div class="profile-stats">${stats}</div>` : ''}
          ${quote}
        </aside>
        <div class="profile-main">
          <div class="wiki-kind">
            <span>${esc(page.kind || '条目')}</span>
            <span class="wk-slug">// ${esc(slug.toUpperCase())}</span>
          </div>
          <h1 class="wiki-zh">${esc(page.zh)}</h1>
          <div class="wiki-en">${esc(page.en)}</div>
          <div class="wiki-summary">${summaryHtml}</div>
        </div>
      </div>
    </div>
  `;
}

// linkify-on-wiki-page that EXCLUDES the current slug (don't self-link)
function linkifyWikiExclude(escapedHtml, currentSlug) {
  if (!escapedHtml) return '';
  let out = escapedHtml;
  for (const [alias, slug] of WIKI_ALIAS_MAP) {
    if (slug === currentSlug) continue;
    const escAlias = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(?<![\\w])${escAlias}(?![^<]*</a>)`, '');
    if (re.test(out)) {
      out = out.replace(re, `<a class="wiki-link" href="${wikiHref(slug)}">${alias}</a>`);
    }
  }
  return out;
}

// =========== E · CATALOG render ===========
function renderCatalog() {
  const root = document.getElementById('var-catalog');

  // Group by `kind`. Within 人物, sub-group by faction (from meta.阵营 first segment).
  const KIND_ORDER = [
    { key: '人物', en: 'PERSONAE', label: 'I' },
    { key: '组织', en: 'ORGANIZATIONS', label: 'II' },
    { key: '国家', en: 'NATIONS', label: 'III' },
    { key: '事件', en: 'EVENTS', label: 'IV' },
    { key: '物质', en: 'MATERIALS', label: 'V' },
    { key: '装备', en: 'EQUIPMENT', label: 'VI' },
    { key: '概念', en: 'CONCEPTS', label: 'VII' },
    { key: '现象', en: 'PHENOMENA', label: 'VIII' }
  ];

  // Faction ordering for 人物 sub-grouping (matches the timeline factions roughly)
  const FACTION_ORDER = [
    { key: '中央 / 11局', match: /(\u592e\u8054|11\u5c40|\u7b2c11\u5c40|\u4e2d\u592e)/, en: 'CENTRAL UNION & BUREAU 11' },
    { key: '维斯冈特帝国', match: /(\u7ef4\u65af\u5188\u7279|\u8702\u5de2|\u7d22\u7f57\u65af\u5bb6|\u7687\u5ba4|\u5e1d\u56fd|\u7b2c\u4e5d\u519b)/, en: 'WIESCAUTE EMPIRE' },
    { key: '罗兹涅 (前)', match: /\u7f57\u5179\u6d85/, en: 'ROZNE (FORMER)' },
    { key: '南岛', match: /(南岛|剑草|赤蕊|帝国占领区|赛汶)/, en: 'SOUTHERN ISLES' },
    { key: '瓦伦图', match: /(瓦伦图)/, en: 'VARENTÚ' },
    { key: '其他', match: /.*/, en: 'OTHERS' }
  ];

  function factionOf(page) {
    const aff = (page.meta || []).find(([k]) => k === '阵营' || k === '出身');
    return aff ? aff[1] : '';
  }
  function factionGroupKey(page) {
    const f = factionOf(page);
    for (const g of FACTION_ORDER) if (g.match.test(f)) return g.key;
    return '其他';
  }

  // Build buckets
  const buckets = {}; // kind -> entries
  for (const slug of Object.keys(WIKI_PAGES)) {
    const p = WIKI_PAGES[slug];
    const k = p.kind || '其他';
    (buckets[k] = buckets[k] || []).push({ slug, page: p });
  }

  let html = '';
  html += `<div class="cat-wrap">`;
  html += `<div class="cat-topbar">
    <a class="cat-back" href="#/p/yiyuan">→ 主档案 · 易渊</a>
    <span>FILE-REF · 11-OPS-INDEX-A</span>
  </div>`;
  html += `<h1 class="cat-title">词条目录</h1>`;
  html += `<div class="cat-subtitle">// CATALOG · ALL ENTRIES</div>`;
  const total = Object.keys(WIKI_PAGES).length;
  html += `<div class="cat-meta">TOTAL · <strong>${total}</strong> ENTRIES &nbsp;·&nbsp; ${KIND_ORDER.filter(k => buckets[k.key]).length} CATEGORIES</div>`;

  for (const ko of KIND_ORDER) {
    const entries = buckets[ko.key];
    if (!entries || !entries.length) continue;

    html += `<section class="cat-section">`;
    html += `<div class="cat-section-head">
      <div class="cat-section-label">§ ${ko.label}</div>
      <h2 class="cat-section-title">${ko.key}<span class="cs-en">${ko.en}</span><span class="cs-count">[${entries.length}]</span></h2>
    </div>`;
    html += `<div class="cat-tree">`;

    if (ko.key === '人物') {
      // Sub-group by faction
      const byFaction = {};
      for (const e of entries) {
        const fk = factionGroupKey(e.page);
        (byFaction[fk] = byFaction[fk] || []).push(e);
      }
      for (const fg of FACTION_ORDER) {
        const list = byFaction[fg.key];
        if (!list || !list.length) continue;
        html += `<div class="cat-group">`;
        html += `<div class="cat-group-label">${fg.key} <span style="opacity:0.5;">/ ${fg.en}</span></div>`;
        for (const e of list) html += renderCatalogRow(e.slug, e.page);
        html += `</div>`;
      }
    } else {
      html += `<div class="cat-group">`;
      for (const e of entries) html += renderCatalogRow(e.slug, e.page);
      html += `</div>`;
    }

    html += `</div></section>`;
  }
  html += `</div>`;

  root.innerHTML = html;
}

function renderCatalogRow(slug, page) {
  const tag = (() => {
    const t = (page.meta || []).find(([k]) => k === '关键词' || k === '身份' || k === '类型' || k === '状态' || k === '时间');
    if (t) return esc((t[1] || '').split(/[·•]/)[0].trim());
    const f = (page.meta || []).find(([k]) => k === '阵营');
    if (f) return esc((f[1] || '').split(/[·•]/)[0].trim());
    return '';
  })();
  return `<a class="cat-row" href="#/p/${slug}">
    <div><span class="cr-zh">${esc(page.zh)}</span></div>
    <div class="cr-en">${esc(page.en || '')}</div>
    <div class="cr-tag">${tag}</div>
  </a>`;
}

// Router: hash format is empty (main page), #/p/<slug>, or #/catalog
function route() {
  const h = location.hash || '';
  const m = h.match(/^#\/p\/([\w-]+)/);
  document.body.dataset.page = m ? m[1] : "catalog";
  const stage = document.querySelectorAll('.exp-stage > section');
  stage.forEach(s => s.classList.remove('active'));
  if (m) {
    const slug = m[1];
    if (slug === 'yiyuan') {
      document.getElementById('var-terminal').classList.add('active');
    } else {
      renderWiki(slug);
      document.getElementById('var-wiki').classList.add('active');
    }
    window.scrollTo(0, 0);
  } else if (h.match(/^#\/catalog/)) {
    renderCatalog();
    document.getElementById('var-catalog').classList.add('active');
    window.scrollTo(0, 0);
  } else {
    // home is the catalog index
    renderCatalog();
    document.getElementById('var-catalog').classList.add('active');
  }
}
window.addEventListener('hashchange', route);
route();

// Faction logo morph: when shell scrolled past, mark gets is-pinned class
(function setupFactionMorph(){
  const spans = document.querySelectorAll('#var-terminal .term-faction-span');
  const statusbar = document.querySelector('#var-terminal .term-statusbar');
  // Morph happens over ~360px of scroll once span enters; clamp 0..1
  const MORPH_DIST = 360;
  function tick(){
    // Sync sticky top with status bar bottom so there's never a gap
    let stickyTop = 98;
    if (statusbar) {
      const sbR = statusbar.getBoundingClientRect();
      stickyTop = Math.max(0, sbR.bottom);
    }
    spans.forEach(span => {
      const mark = span.querySelector('.term-faction-mark');
      if (!mark) return;
      mark.style.top = stickyTop + 'px';
      const rect = span.getBoundingClientRect();
      // Progress: 0 when span just entered viewport-top, 1 after MORPH_DIST scrolled past
      const past = -rect.top; // px scrolled past span's top
      let p = past / MORPH_DIST;
      if (p < 0) p = 0;
      if (p > 1) p = 1;
      mark.style.setProperty('--p', p.toFixed(3));
      // Expose current banner height so first chapter inside the span can offset
      span.style.setProperty('--banner-h', mark.offsetHeight + 'px');
    });
  }
  let raf = 0;
  window.addEventListener('scroll', () => { if (!raf) raf = requestAnimationFrame(() => { raf = 0; tick(); }); }, { passive: true });
  window.addEventListener('resize', tick);
  tick();
})();

// Epilogue fade: when the post-archive chapter enters the upper portion of viewport,
// fade out the sticky status bar + faction banners.
(function setupEpilogueFade(){
  const root = document.getElementById('var-terminal');
  const epi = root && root.querySelector('.term-chapter-block.is-epilogue');
  if (!root || !epi) return;
  function tick(){
    const r = epi.getBoundingClientRect();
    // Activate when the epilogue's top crosses ~60% down the viewport
    const active = r.top < window.innerHeight * 0.6;
    root.classList.toggle('is-epilogue-active', active);
  }
  let raf = 0;
  window.addEventListener('scroll', () => { if (!raf) raf = requestAnimationFrame(() => { raf = 0; tick(); }); }, { passive: true });
  window.addEventListener('resize', tick);
  tick();
})();
</script>
